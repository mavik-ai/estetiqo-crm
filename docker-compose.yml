version: '3.8'

services:
  # ==========================================
  # SERVIÇO 1: BACKEND (FastAPI - Python)
  # ==========================================
  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: estetiqo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_API_TOKEN=${EVOLUTION_API_TOKEN}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - N8N_API_KEY=${N8N_API_KEY}

  # ==========================================
  # SERVIÇO 2: FRONTEND (NextJS SSR - Node)
  # ==========================================
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: estetiqo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
    depends_on:
      - api # Garante que o Front só sob após o Back estar de pé
